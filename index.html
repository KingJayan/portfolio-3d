<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@300;500;600&display=swap"
        rel="stylesheet">
    <style>
        /* dark-industrial theme tokens */
        :root {
            --bg-color: #0c0d0f;
            --panel-bg: #111215;

            --highlight: #ff4a1c;

            --text-color: #818a99;
            --text-muted: #5a606b;

            --border-color: rgba(255, 255, 255, 0.05);
            --border-light: rgba(255, 255, 255, 0.1);
            --shadow-deep: 0 24px 48px rgba(0, 0, 0, 0.6);

            --font-main: 'Inter', sans-serif;
            --font-head: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            user-select: none;
            cursor: grab;
            -webkit-font-smoothing: antialiased;
        }

        body:active {
            cursor: grabbing;
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            perspective: 1000px;
            overflow: hidden;
            position: relative;
        }

        /* 3d scene root */
        #scene {
            width: 0;
            height: 0;
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            transform-origin: center center;
            will-change: transform;
        }

        /* room/object container */
        .node {
            position: absolute;
            transform-style: preserve-3d;
            border-radius: 4px;
            will-change: transform;
        }

        /* content reveal layer */
        .node-content {
            opacity: 0.1;
            transform: translateZ(-30px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .node.near .node-content {
            opacity: 1;
            transform: translateZ(0);
            pointer-events: auto;
        }

        /* min panels */
        .panel {
            background-color: var(--panel-bg);
            background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(0, 0, 0, 0.2) 100%);
            box-shadow: var(--shadow-deep);
            border-radius: 4px;
            padding: 48px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-top: 1px solid var(--border-light);
            transition: border-color 0.4s ease, transform 0.4s ease;
            width: 420px;
        }

        .panel:hover {
            border-color: var(--highlight-ghost);
            transform: translateZ(10px);
        }

        .panel:hover h2 {
            text-shadow: 2px 0 0 rgba(255, 74, 28, 0.8), -2px 0 0 rgba(0, 255, 255, 0.6);
        }

        h2 {
            font-family: var(--font-head);
            margin: 0 0 20px 0;
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            transition: text-shadow 0.3s ease;
        }

        p {
            margin: 0 0 24px 0;
            line-height: 1.7;
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* background detail */
        .grid {
            position: absolute;
            width: 3000px;
            height: 3000px;
            top: -1500px;
            left: -1500px;
            background-image: linear-gradient(rgba(255, 74, 28, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 74, 28, 0.03) 1px, transparent 1px);
            background-size: 100px 100px;
            transform: translateZ(-1000px);
            pointer-events: none;
            animation: gridPulse 8s infinite alternate ease-in-out;
        }

        @keyframes gridPulse {
            0% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        /* skills visualizer */
        .skill-group {
            width: 100%;
        }

        .skill-label {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            margin-bottom: 8px;
            display: block;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .skill-bar {
            width: 100%;
            height: 2px;
            background: #1c1d21;
            margin-bottom: 24px;
        }

        .skill-fill {
            height: 100%;
            background: var(--highlight);
            box-shadow: 0 0 8px var(--highlight-glow);
        }

        /* professional form inputs */
        input,
        textarea {
            background: #0a0b0d;
            border: 1px solid var(--border-color);
            color: #ffffff;
            padding: 14px 16px;
            border-radius: 2px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 16px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            resize: none;
            transition: all 0.2s ease;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--highlight);
            background: #0d0f12;
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--text-muted);
        }

        button {
            background: #ffffff;
            color: #000000;
            padding: 14px 24px;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-weight: 500;
            font-family: var(--font-head);
            letter-spacing: 0.02em;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            width: 100%;
        }

        button:hover {
            background: var(--highlight);
            color: #ffffff;
        }

        /* project sub-objects */
        .hub-title {
            transform: translateZ(50px);
            pointer-events: none;
            margin-bottom: 40px;
        }

        .proj-obj {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--panel-bg);
            border-radius: 2px;
            cursor: pointer;
            box-shadow: var(--shadow-deep);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
            border: 1px solid var(--border-color);
            animation: float 6s infinite ease-in-out;
            overflow: hidden;
        }

        .proj-obj:hover {
            border-color: var(--highlight-glow);
        }

        .proj-obj .icon {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .proj-obj:hover .icon {
            color: var(--highlight);
        }

        .proj-obj .info {
            opacity: 0;
            position: absolute;
            padding: 24px;
            text-align: left;
            transition: opacity 0.3s;
            pointer-events: none;
            width: 100%;
            box-sizing: border-box;
        }

        .proj-obj.active {
            width: 300px;
            height: 160px;
            z-index: 10;
            animation: none;
            transform: translateZ(60px) !important;
            border-left: 2px solid var(--highlight);
        }

        .proj-obj.active .icon {
            opacity: 0;
        }

        .proj-obj.active .info {
            opacity: 1;
            pointer-events: auto;
        }

        .proj-obj:hover h3 {
            text-shadow: 2px 0 0 rgba(255, 74, 28, 0.8), -2px 0 0 rgba(0, 255, 255, 0.6);
        }

        .proj-obj h3 {
            font-family: var(--font-head);
            margin: 0 0 8px 0;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 500;
            transition: text-shadow 0.3s ease;
        }

        .proj-obj p {
            font-size: 0.85rem;
            margin: 0;
            color: var(--text-color);
        }

        /* volumetric shapes */
        .exp-shape {
            position: absolute;
            width: 100px;
            height: 100px;
            background: transparent;
            border: 1px solid var(--highlight-ghost);
            animation: spin 16s infinite linear;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes spin {
            to {
                transform: rotateY(360deg) rotateX(360deg);
            }
        }

        /* min ui nav */
        .ui-nav {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 24px;
            z-index: 9999;
        }

        .ui-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 0;
            border-radius: 0;
            font-size: 0.75rem;
            font-weight: 500;
            font-family: var(--font-mono);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
            width: auto;
            position: relative;
        }

        .ui-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 1px;
            background: var(--highlight);
            transition: width 0.3s ease;
        }

        .ui-btn:hover {
            color: #ffffff;
            background: transparent;
        }

        .ui-btn:hover::after {
            width: 100%;
        }

        .overlay {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            letter-spacing: 0.1em;
            color: var(--text-muted);
            pointer-events: none;
            z-index: 100;
        }

        .console {
            position: fixed;
            bottom: 30px;
            right: 40px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--highlight);
            text-align: right;
            line-height: 1.6;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.7;
            text-transform: uppercase;
        }

        #load-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: var(--font-mono);
            color: var(--highlight);
            transition: opacity 1s ease, visibility 1s;
        }

        .boot-text {
            font-size: 0.8rem;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(10px);
            animation: bootEntry 0.4s forwards;
        }

        /* background effects layer */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        #scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 3px,
                    rgba(0, 0, 0, 0.18) 3px,
                    rgba(0, 0, 0, 0.18) 4px);
            opacity: 0;
            transition: opacity 0.5s;
        }

        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.75) 100%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        @keyframes scanlineFlicker {

            0%,
            100% {
                opacity: 0.85;
            }

            50% {
                opacity: 1;
            }
        }

        @keyframes bootEntry {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <canvas id="bg-canvas"></canvas>
    <div id="scanlines"></div>
    <div id="vignette"></div>

    <div id="viewport">
        <div id="scene">
            <div class="grid"></div>

            <!-- about -->
            <div class="node" data-pos="-1000,0,0" data-rot="0,90">
                <div class="node-content panel" id="render-about">
                    <!-- config rendered -->
                </div>
            </div>

            <!-- projects -->
            <div class="node" data-pos="0,0,-1000" data-rot="0,0">
                <div class="node-content" id="render-proj">
                    <!-- config rendered -->
                </div>
            </div>

            <!-- experiments -->
            <div class="node" data-pos="1000,0,0" data-rot="0,-90">
                <div class="node-content panel" id="render-exp"
                    style="background: transparent; border: none; box-shadow: none;">
                    <!-- config rendered -->
                </div>
            </div>

            <!-- contact -->
            <div class="node" data-pos="0,0,1000" data-rot="0,180">
                <div class="node-content panel" id="render-contact">
                    <!-- config rendered -->
                </div>
            </div>

        </div>
    </div>

    <div class="overlay">DRAG TO ROTATE | SCROLL TO DOLLY | CLICK TO FOCUS</div>

    <div class="ui-nav" id="render-nav">
        <!-- config rendered-->
    </div>

    <div class="console" id="console">
        XYZ: 0.00, 0.00, 0.00<br />
        ROT: 0.00, 0.00<br />
    </div>

    <div id="load-screen">
        <!-- config rendered -->
    </div>

    <script>
        // theme presets
        const THEMES = {
            forge: {
                background: "#0c0d0f",
                panel: "#111215",
                accent: "#ff4a1c",
                text: "#818a99",
                glitch: "#00ffcc",
                grid: "rgba(255, 74, 28, 0.03)"
            },
            midnight: {
                background: "#080a12",
                panel: "#0e1018",
                accent: "#6c5ce7",
                text: "#8a8ea8",
                glitch: "#ffd93d",
                grid: "rgba(108, 92, 231, 0.03)"
            },
            arctic: {
                background: "#0a0e14",
                panel: "#0f1319",
                accent: "#00b4d8",
                text: "#94a3b8",
                glitch: "#ff6b6b",
                grid: "rgba(0, 180, 216, 0.03)"
            },
            terminal: {
                background: "#0a0a0a",
                panel: "#0f0f0f",
                accent: "#39ff14",
                text: "#7a8a7a",
                glitch: "#ff00ff",
                grid: "rgba(57, 255, 20, 0.03)"
            },
            ember: {
                background: "#0f0b0a",
                panel: "#151110",
                accent: "#f97316",
                text: "#9a8578",
                glitch: "#38bdf8",
                grid: "rgba(249, 115, 22, 0.03)"
            }
        };

        // template configuration
        const CONFIG = {
            name: "Demo",
            title: "3D Portfolio",
            theme: "midnight", // forge | midnight | arctic | terminal | ember
            bg: "nebula",   // none | particles | scanlines | nebula
            bootSequence: [
                "> INITIALIZING...",
                "> LOADING COMPONENTS...",
                "> RENDERING SCENE...",
                "> READY."
            ],
            startLocation: [0, 175, 0], //x,y,z
            nav: {
                home: "Home",
                about: "About",
                projects: "Projects",
                experiments: "Experiments",
                contact: "Contact"
            },
            about: {
                title: "About",
                text: "i make stuff",
                skills: [
                    { name: "HTML", progress: 90 },
                    { name: "WebGL / 3D Graphics", progress: 75 },
                    { name: "3d CSS", progress: 85 }
                ]
            },
            projects: {
                title: "Projects",
                items: [
                    { id: "01", name: "project 1", desc: "lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, quod.", left: -200, top: 20, delay: 0 },
                    { id: "02", name: "project 2", desc: "lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, quod.", left: 0, top: 120, delay: -1 },
                    { id: "03", name: "project 3", desc: "lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, quod.", left: 200, top: 0, delay: -2 }
                ]
            },
            experiments: {
                title: "Experiments",
                text: "lorem ipsum"
            },
            contact: {
                title: "Contact Me",
                text: "idk",
                placeholders: { name: "Name", message: "Message..." },
                buttonText: "send",
                socials: [
                    { name: "GitHub", url: "#" },
                    { name: "Twitter", url: "#" }
                ]
            }
        };

        // dom render function - do not edit
        document.title = CONFIG.name + " | " + CONFIG.title;

        // apply theme
        const theme = THEMES[CONFIG.theme] || THEMES.forge;
        const root = document.documentElement;
        root.style.setProperty('--bg-color', theme.background);
        root.style.setProperty('--panel-bg', theme.panel);
        root.style.setProperty('--highlight', theme.accent);
        root.style.setProperty('--text-color', theme.text);
        root.style.setProperty('--highlight-ghost', theme.accent + '4D');
        root.style.setProperty('--highlight-glow', theme.accent + '66');

        // apply colors to hover rules
        const glitchStyle = document.createElement('style');
        glitchStyle.textContent = `
            .panel:hover h2, .proj-obj:hover h3 {
                text-shadow: 2px 0 0 ${theme.accent}, -2px 0 0 ${theme.glitch} !important;
            }
            .grid {
                background-image: linear-gradient(${theme.grid} 1px, transparent 1px), linear-gradient(90deg, ${theme.grid} 1px, transparent 1px) !important;
            }
            .exp-shape { border-color: ${theme.accent} !important; opacity: 0.3; }
            .skill-fill { background: ${theme.accent} !important; box-shadow: 0 0 8px ${theme.accent}66 !important; }
            .ui-btn::after { background: ${theme.accent} !important; }
            .console { color: ${theme.accent} !important; }
            #load-screen { color: ${theme.accent} !important; }
        `;
        document.head.appendChild(glitchStyle);

        // background effects
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
        window.addEventListener('resize', () => {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        });

        const BG_EFFECTS = {
            none: { init: () => { }, tick: () => { } },

            particles: {
                pts: [],
                W: 0, H: 0,
                LINK_DIST: 140,
                COUNT: 90,
                _r: 0, _g: 0, _b: 0,
                init() {
                    this.W = bgCanvas.width;
                    this.H = bgCanvas.height;
                    // parse hex to rgb once
                    const hex = theme.accent.replace('#', '');
                    this._r = parseInt(hex.substring(0, 2), 16);
                    this._g = parseInt(hex.substring(2, 4), 16);
                    this._b = parseInt(hex.substring(4, 6), 16);
                    for (let i = 0; i < this.COUNT; i++) {
                        this.pts.push({
                            x: Math.random() * this.W,
                            y: Math.random() * this.H,
                            vx: (Math.random() - 0.5) * 0.5,
                            vy: (Math.random() - 0.5) * 0.5,
                            r: Math.random() * 1.8 + 0.6
                        });
                    }
                    window.addEventListener('resize', () => {
                        this.W = bgCanvas.width;
                        this.H = bgCanvas.height;
                    });
                },
                tick() {
                    const W = this.W, H = this.H;
                    const rv = this._r, gv = this._g, bv = this._b;
                    bgCtx.clearRect(0, 0, W, H);

                    // move & wrap particles
                    this.pts.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        if (p.x < 0) p.x = W;
                        if (p.x > W) p.x = 0;
                        if (p.y < 0) p.y = H;
                        if (p.y > H) p.y = 0;
                    });

                    // draw connection lines
                    for (let i = 0; i < this.pts.length; i++) {
                        for (let j = i + 1; j < this.pts.length; j++) {
                            const dx = this.pts[i].x - this.pts[j].x;
                            const dy = this.pts[i].y - this.pts[j].y;
                            const d = Math.sqrt(dx * dx + dy * dy);
                            if (d < this.LINK_DIST) {
                                const a = (1 - d / this.LINK_DIST) * 0.3;
                                bgCtx.beginPath();
                                bgCtx.moveTo(this.pts[i].x, this.pts[i].y);
                                bgCtx.lineTo(this.pts[j].x, this.pts[j].y);
                                bgCtx.strokeStyle = `rgba(${rv},${gv},${bv},${a})`;
                                bgCtx.lineWidth = 0.8;
                                bgCtx.stroke();
                            }
                        }
                    }

                    // draw dots on top
                    this.pts.forEach(p => {
                        bgCtx.beginPath();
                        bgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        bgCtx.fillStyle = `rgba(${rv},${gv},${bv},0.7)`;
                        bgCtx.fill();
                    });
                }
            },

            scanlines: {
                init() {
                    const sl = document.getElementById('scanlines');
                    sl.style.opacity = '1';
                    sl.style.animation = 'scanlineFlicker 4s infinite ease-in-out';
                    document.getElementById('vignette').style.opacity = '1';
                },
                tick() { }
            },

            nebula: {
                blobs: [],
                init() {
                    for (let i = 0; i < 3; i++) {
                        this.blobs.push({
                            x: (0.2 + Math.random() * 0.6) * bgCanvas.width,
                            y: (0.2 + Math.random() * 0.6) * bgCanvas.height,
                            r: 180 + Math.random() * 100,
                            phase: Math.random() * Math.PI * 2,
                            speed: 0.00015 + Math.random() * 0.00015
                        });
                    }
                    document.getElementById('vignette').style.opacity = '0.5';
                },
                tick() {
                    bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
                    this.blobs.forEach(b => {
                        b.phase += b.speed;
                        const px = b.x + Math.sin(b.phase) * 45;
                        const py = b.y + Math.cos(b.phase * 0.7) * 30;
                        const grad = bgCtx.createRadialGradient(px, py, 0, px, py, b.r);
                        grad.addColorStop(0, theme.accent + '0d');
                        grad.addColorStop(0.5, theme.accent + '05');
                        grad.addColorStop(1, 'transparent');
                        bgCtx.beginPath();
                        bgCtx.arc(px, py, b.r, 0, Math.PI * 2);
                        bgCtx.fillStyle = grad;
                        bgCtx.fill();
                    });
                }
            }
        };

        const bgEffect = BG_EFFECTS[CONFIG.bg] || BG_EFFECTS.none;
        bgEffect.init();

        function bgLoop() {
            bgEffect.tick();
            requestAnimationFrame(bgLoop);
        }
        bgLoop();

        // render boot screen
        document.getElementById('load-screen').innerHTML = CONFIG.bootSequence
            .map((text, i) => `<div class="boot-text" style="animation-delay: ${0.2 + (i * 0.3)}s;">${text}</div>`)
            .join('');

        // render nav
        document.getElementById('render-nav').innerHTML = `
            <button class="ui-btn" id="nav-home">${CONFIG.nav.home}</button>
            <button class="ui-btn" id="nav-about">${CONFIG.nav.about}</button>
            <button class="ui-btn" id="nav-proj">${CONFIG.nav.projects}</button>
            <button class="ui-btn" id="nav-exp">${CONFIG.nav.experiments}</button>
            <button class="ui-btn" id="nav-contact">${CONFIG.nav.contact}</button>
        `;

        document.getElementById('render-about').innerHTML = `
            <h2>${CONFIG.about.title}</h2>
            <p>${CONFIG.about.text}</p>
            <div class="skill-group">
                ${CONFIG.about.skills.map(s => `
                    <span class="skill-label">${s.name}</span>
                    <div class="skill-bar"><div class="skill-fill" style="width: ${s.progress}%;"></div></div>
                `).join('')}
            </div>
        `;
        document.getElementById('render-proj').innerHTML = `
            <h2 class="hub-title">${CONFIG.projects.title}</h2>
            ${CONFIG.projects.items.map(p => `
                <div class="proj-obj" style="left: ${p.left}px; top: ${p.top}px; animation-delay: ${p.delay}s;">
                    <div class="icon">${p.id}</div>
                    <div class="info"><h3>${p.name}</h3><p>${p.desc}</p></div>
                </div>
            `).join('')}
        `;
        document.getElementById('render-exp').innerHTML = `
            <h2>${CONFIG.experiments.title}</h2>
            <p>${CONFIG.experiments.text}</p>
            <div class="exp-shape" style="top: 150px; left: 0; border-radius: 50%;"></div>
            <div class="exp-shape" style="top: 150px; left: 150px; animation-duration: 7s;"></div>
        `;
        document.getElementById('render-contact').innerHTML = `
            <h2>${CONFIG.contact.title}</h2>
            <p>${CONFIG.contact.text}</p>
            <div style="margin-bottom: 16px; display: flex; gap: 12px;">
                ${CONFIG.contact.socials.map(s => `<a href="${s.url}" style="color: var(--highlight); text-decoration: none; font-size: 0.85rem; font-family: var(--font-mono); text-transform: uppercase;">[${s.name}]</a>`).join('')}
            </div>
            <input type="text" placeholder="${CONFIG.contact.placeholders.name}" />
            <textarea rows="3" placeholder="${CONFIG.contact.placeholders.message}"></textarea>
            <button>${CONFIG.contact.buttonText}</button>
        `;

        const scene = document.getElementById('scene');
        const nodes = document.querySelectorAll('.node');

        /* cam state/targets */
        const obj = { x: CONFIG.startLocation[0], y: CONFIG.startLocation[1], z: CONFIG.startLocation[2], rx: 0, ry: 0 };
        const tar = { x: CONFIG.startLocation[0], y: CONFIG.startLocation[1], z: CONFIG.startLocation[2], rx: 0, ry: 0 };

        /* init scene nodes */
        const parsedNodes = [];
        nodes.forEach(node => {
            const [x, y, z] = node.dataset.pos.split(',').map(Number);
            const [rx, ry] = node.dataset.rot.split(',').map(Number);
            node.style.transform = `translate(-50%, -50%) translate3d(${x}px, ${y}px, ${z}px) rotateY(${ry}deg) rotateX(${rx}deg)`;

            const focusFn = () => {
                const dist = 600;
                const rX = rx * Math.PI / 180;
                const rY = ry * Math.PI / 180;
                tar.x = x + Math.sin(rY) * Math.cos(rX) * dist;
                tar.y = y - Math.sin(rX) * dist;
                tar.z = z + Math.cos(rY) * Math.cos(rX) * dist;
                tar.rx = rx; tar.ry = ry;
            };

            parsedNodes.push({ node, x, y, z, focusFn });

            /* cam focus click */
            node.addEventListener('click', focusFn);
        });

        /* bind ui nav */
        document.getElementById('nav-home').addEventListener('click', () => {
            tar.x = 0; tar.y = 0; tar.z = 0; tar.rx = 0; tar.ry = 0;
        });
        document.getElementById('nav-about').addEventListener('click', parsedNodes[0].focusFn);
        document.getElementById('nav-proj').addEventListener('click', parsedNodes[1].focusFn);
        document.getElementById('nav-exp').addEventListener('click', parsedNodes[2].focusFn);
        document.getElementById('nav-contact').addEventListener('click', parsedNodes[3].focusFn);

        /* sub-object toggle */
        document.querySelectorAll('.proj-obj').forEach(p => {
            p.addEventListener('click', (e) => {
                e.stopPropagation();
                document.querySelectorAll('.proj-obj').forEach(o => o !== p && o.classList.remove('active'));
                p.classList.toggle('active');
            });
        });

        /* drag rotation */
        let dragging = false;
        let sX = 0, sY = 0;

        window.addEventListener('mousedown', e => { dragging = true; sX = e.clientX; sY = e.clientY; });
        window.addEventListener('mousemove', e => {
            if (!dragging) return;
            tar.ry -= (e.clientX - sX) * 0.15;
            tar.rx += (e.clientY - sY) * 0.15;
            tar.rx = Math.max(-80, Math.min(80, tar.rx));
            sX = e.clientX; sY = e.clientY;
        });
        window.addEventListener('mouseup', () => dragging = false);
        window.addEventListener('mouseleave', () => dragging = false);

        /* dolly movement */
        window.addEventListener('wheel', e => {
            e.preventDefault();
            if (document.querySelector('.proj-obj.active')) return;

            const amt = e.deltaY * 0.5;
            const ryR = tar.ry * Math.PI / 180;
            const rxR = tar.rx * Math.PI / 180;
            tar.x += Math.sin(ryR) * Math.cos(rxR) * amt;
            tar.y -= Math.sin(rxR) * amt;
            tar.z += Math.cos(ryR) * Math.cos(rxR) * amt;
        }, { passive: false });

        /* render loop */
        const consoleEl = document.getElementById('console');

        function loop() {
            const ease = 0.05;
            obj.x += (tar.x - obj.x) * ease; obj.y += (tar.y - obj.y) * ease; obj.z += (tar.z - obj.z) * ease;
            obj.rx += (tar.rx - obj.rx) * ease; obj.ry += (tar.ry - obj.ry) * ease;

            scene.style.transform = `rotateX(${-obj.rx}deg) rotateY(${-obj.ry}deg) translate3d(${-obj.x}px, ${-obj.y}px, ${-obj.z}px)`;

            /* update console */
            consoleEl.innerHTML = `
                XYZ: ${obj.x.toFixed(2)}, ${obj.y.toFixed(2)}, ${obj.z.toFixed(2)}<br/>
                ROT: ${obj.rx.toFixed(2)}, ${obj.ry.toFixed(2)}<br/>
            `;

            /* proximity checks */
            parsedNodes.forEach(({ node, x, y, z }) => {
                const dist = Math.hypot(x - obj.x, y - obj.y, z - obj.z);
                if (dist < 1000) {
                    if (!node.classList.contains('near')) node.classList.add('near');
                } else {
                    if (node.classList.contains('near')) node.classList.remove('near');
                }
            });

            requestAnimationFrame(loop);
        }

        /* hide boot screen */
        window.addEventListener('load', () => {
            setTimeout(() => {
                const boot = document.getElementById('load-screen');
                boot.style.opacity = '0';
                setTimeout(() => boot.style.visibility = 'hidden', 1000);
            }, 2000);
        });

        loop();
    </script>

</body>

</html>
